name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            gcc-mingw-w64-x86-64

      - name: Cache wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: wails-v2.12.0-${{ runner.os }}

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Patch wails.json version
        run: |
          VER="${GITHUB_REF_NAME#v}"
          sed -i "s/\"productVersion\": \"[^\"]*\"/\"productVersion\": \"${VER}\"/" wails.json

      - name: Build Linux
        run: |
          wails build -tags "wails webkit2_41" \
            -ldflags "-X main.version=${GITHUB_REF_NAME}"
          mv build/bin/kub-connect "kub-connect-${GITHUB_REF_NAME}-linux-amd64"

      - name: Build Windows
        env:
          CC: x86_64-w64-mingw32-gcc
          CXX: x86_64-w64-mingw32-g++
          CGO_ENABLED: "1"
        run: |
          wails build -platform windows/amd64 -tags wails \
            -ldflags "-X main.version=${GITHUB_REF_NAME}"
          mv "build/bin/kub-connect.exe" "kub-connect-${GITHUB_REF_NAME}-windows-amd64.exe"

      - name: Extract release notes from CHANGELOG.md
        run: |
          awk "/^## ${GITHUB_REF_NAME}/{found=1; next} found && /^## /{exit} found{print}" \
            CHANGELOG.md > release-notes.md
          touch release-notes.md

      - name: Create release via Gitea API
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          set -euo pipefail
          API="https://gitverse.ru/api/v1/repos/raynoldripper/KUB-Connect"

          if [ -z "${GITEA_TOKEN:-}" ]; then
            echo "::error::GITEA_TOKEN secret is empty/unset — add it in repo Settings > Secrets"
            exit 1
          fi

          BODY=$(cat release-notes.md | jq -Rs .)
          IS_PRE=$( echo "${GITHUB_REF_NAME}" | grep -q '-' && echo true || echo false )

          echo "Creating release ${GITHUB_REF_NAME} ..."
          RESP=$(curl -sS -w "\n%{http_code}" -X POST "${API}/releases" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${GITHUB_REF_NAME}\",\"name\":\"${GITHUB_REF_NAME}\",\"body\":${BODY},\"draft\":false,\"prerelease\":${IS_PRE}}")
          CODE=$(echo "$RESP" | tail -n1)
          JSON=$(echo "$RESP" | sed '$d')
          echo "HTTP ${CODE}"
          echo "$JSON"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::Release creation failed (HTTP ${CODE})"
            exit 1
          fi

          RELEASE_ID=$(echo "$JSON" | jq -r '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "::error::No release id in API response"
            exit 1
          fi
          echo "Release id: ${RELEASE_ID}"

          for FILE in kub-connect-*-linux-amd64 kub-connect-*-windows-amd64.exe; do
            [ -e "$FILE" ] || { echo "::error::asset missing: $FILE"; exit 1; }
            echo "Uploading ${FILE} ..."
            ACODE=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
              "${API}/releases/${RELEASE_ID}/assets" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${FILE}")
            echo "  HTTP ${ACODE}"
            if [ "$ACODE" -lt 200 ] || [ "$ACODE" -ge 300 ]; then
              echo "::error::asset upload failed for ${FILE} (HTTP ${ACODE})"
              exit 1
            fi
          done
