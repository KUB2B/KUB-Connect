name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            gcc-mingw-w64-x86-64

      - name: Cache wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: wails-v2.12.0-${{ runner.os }}

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Ensure wails on PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Patch wails.json version
        run: |
          VER="${GITHUB_REF_NAME#v}"
          sed -i "s/\"productVersion\": \"[^\"]*\"/\"productVersion\": \"${VER}\"/" wails.json

      - name: Build Linux
        run: |
          wails build -tags "wails webkit2_41" \
            -ldflags "-X main.version=${GITHUB_REF_NAME}"
          mv build/bin/kub-connect "kub-connect-${GITHUB_REF_NAME}-linux-amd64"

      - name: Build Windows
        env:
          CC: x86_64-w64-mingw32-gcc
          CXX: x86_64-w64-mingw32-g++
          CGO_ENABLED: "1"
        run: |
          wails build -platform windows/amd64 -tags wails \
            -ldflags "-X main.version=${GITHUB_REF_NAME}"
          mv "build/bin/kub-connect.exe" "kub-connect-${GITHUB_REF_NAME}-windows-amd64.exe"

      - name: Extract release notes from CHANGELOG.md
        run: |
          awk "/^## ${GITHUB_REF_NAME}/{found=1; next} found && /^## /{exit} found{print}" \
            CHANGELOG.md > release-notes.md
          touch release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            kub-connect-*-linux-amd64
            kub-connect-*-windows-amd64.exe
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
